services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mhylle/recipe-manager-backend:latest}
    build: !reset null
    container_name: recipe-manager-backend
    environment:
      - DATABASE_URL=postgresql://recipe_manager_user:${RECIPE_MANAGER_DB_PASSWORD}@mhylle-postgres:5432/recipe_manager_db
      - CORS_ORIGIN=https://mhylle.com
      - PORT=3000
    ports:
      - "8006:3000"
    depends_on: !reset {}
    restart: unless-stopped
    networks:
      - mhylle_app-network

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/mhylle/recipe-manager-frontend:latest}
    build: !reset null
    container_name: recipe-manager-frontend
    ports:
      - "3007:80"
    restart: unless-stopped
    networks:
      - mhylle_app-network

networks:
  mhylle_app-network:
    external: true
