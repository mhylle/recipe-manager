services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe-manager-backend
    environment:
      - DATABASE_URL=postgresql://recipe_manager_user:${RECIPE_MANAGER_DB_PASSWORD:-devpassword}@${DB_HOST:-postgres}:5432/recipe_manager_db
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:4200}
      - PORT=3000
    ports:
      - "${BACKEND_PORT:-8006}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BASE_HREF: /recipe-manager/
    container_name: recipe-manager-frontend
    ports:
      - "${FRONTEND_PORT:-3007}:80"
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: recipe-manager-postgres
    environment:
      - POSTGRES_USER=recipe_manager_user
      - POSTGRES_PASSWORD=${RECIPE_MANAGER_DB_PASSWORD:-devpassword}
      - POSTGRES_DB=recipe_manager_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_manager_user -d recipe_manager_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
